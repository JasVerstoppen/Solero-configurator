<!DOCTYPE html>
<html lang="en" class="h-full overflow-hidden">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" />
    <title>Solero Basto Configurator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --image-height: 40dvh;
        --panel-height: 60dvh;
      }
      @media (min-width: 1024px) {
        :root {
          --image-height: 100dvh;
          --panel-height: 100dvh;
        }
      }
      html, body {
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        position: fixed;
        overscroll-behavior: none;
      }
      #root {
        height: 100%;
        width: 100%;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: #cbd5e1;
        border-radius: 10px;
      }

      /* Orientation Hint Animation */
      @keyframes rotate-hint {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(-90deg); }
      }
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-rotate-device {
        animation: rotate-hint 2.5s ease-in-out infinite;
      }
      .animate-fade-in {
        animation: fade-in 0.5s ease-out forwards;
      }

      /* Show hint only on touch devices in landscape with restricted height */
      .orientation-hint {
        display: none;
      }
      @media (orientation: landscape) and (max-height: 768px) and (pointer: coarse) {
        .orientation-hint {
          display: flex;
        }
      }
    </style>
</head>
  <body class="bg-white">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
